# Lets any repo add Drillable Check to .pre-commit-config.yaml:
#
#   - repo: https://github.com/drillablehq/check
#     rev: v0.1.0
#     hooks:
#       - id: drillable-check
#
# Runs on staged dependency manifests; fails the commit only on a flagged package (abstentions pass).
- id: drillable-check
  name: Drillable Check (verify dependencies)
  description: Catches hallucinated/squatted/unpublished/vulnerable deps in changed lockfiles; fails only on a flagged package.
  entry: npx --yes drillable-check@latest
  language: node
  files: (^|/)(package\.json|package-lock\.json|requirements\.txt)$
  pass_filenames: true
  require_serial: true
